version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nativelayer
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: nativelayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nativelayer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
